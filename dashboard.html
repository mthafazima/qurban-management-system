<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — Kupon Qurban</title>
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

  <div class="app-shell" id="shell">
    <main class="main">
      <div class="topbar-bar">
        <button class="hamburger" id="hamburgerBtn">&#9776;</button>
      </div>
      <div class="topbar">
        <div>
          <h1>Dashboard</h1>
          <div class="subtitle" id="pageSubtitle">Ringkasan kupon qurban</div>
        </div>
        <div class="topbar-actions" id="masjidSwitcherWrap"></div>
      </div>

      <div class="grid grid-4" id="statGrid">
        <div class="card stat-card">
          <div class="stat-label">Total Kupon</div>
          <div class="stat-value">&mdash;</div>
        </div>
        <div class="card stat-card">
          <div class="stat-label">Sudah Ditukar</div>
          <div class="stat-value">&mdash;</div>
        </div>
        <div class="card stat-card">
          <div class="stat-label">Belum Ditukar</div>
          <div class="stat-value">&mdash;</div>
        </div>
        <div class="card stat-card accent">
          <div class="stat-label">Ditukar Hari Ini</div>
          <div class="stat-value">&mdash;</div>
        </div>
      </div>

      <div class="section-title">Penukaran Terbaru</div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>Nomor Kupon</th><th>Waktu</th><th>Petugas</th></tr>
          </thead>
          <tbody id="terbaruBody">
            <tr><td colspan="3">Memuat...</td></tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <script src="assets/js/config.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/nav.js"></script>
  <script>
    const session = renderShell("dashboard");

    if (session) {

      if (session.role === "SUPER_ADMIN") {
        renderMasjidSwitcher(function () {
          loadDashboard();
          updateSubtitle();
        }).then(updateSubtitle); // update subtitle awal setelah daftar masjid selesai dimuat
      } else {
        updateSubtitle();
      }

      loadDashboard();
    }

    function updateSubtitle() {
      const el = document.getElementById("pageSubtitle");

      if (session.role !== "SUPER_ADMIN") {
        el.textContent = session.alamat_masjid
          ? "Ringkasan kupon qurban \u2014 " + session.alamat_masjid
          : "Ringkasan kupon qurban";
        return;
      }

      const targetId = Auth.getTargetMasjid();
      const found = targetId ? getMasjidById(targetId) : null;

      if (found) {
        el.textContent = "Ringkasan kupon qurban \u2014 " + (found.alamat || found.nama_masjid);
      } else {
        el.textContent = "Ringkasan kupon qurban dari semua masjid";
      }
    }

    async function loadDashboard() {
      try {
        const data = await Api.call("dashboard", {});

        const cards = document.querySelectorAll("#statGrid .stat-value");
        cards[0].textContent = data.total_kupon;
        cards[1].textContent = data.sudah_ditukar;
        cards[2].textContent = data.belum_ditukar;
        cards[3].textContent = data.hari_ini;

        const body = document.getElementById("terbaruBody");

        if (!data.terbaru || data.terbaru.length === 0) {
          body.innerHTML = '<tr><td colspan="3">Belum ada penukaran.</td></tr>';
          return;
        }

        body.innerHTML = data.terbaru.map(function (row) {
          return '<tr>' +
            '<td class="mono">' + row.nomor_kupon + '</td>' +
            '<td>' + fmtTanggal(row.tanggal) + '</td>' +
            '<td>' + (row.petugas || "-") + '</td>' +
          '</tr>';
        }).join("");

      } catch (err) {
        showToast(err.message, true);
      }
    }
  </script>
</body>
</html>
