<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kelola Kupon — Kupon Qurban</title>
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

  <div class="app-shell" id="shell">
    <main class="main">
      <div class="topbar-bar">
        <button class="hamburger" id="hamburgerBtn">&#9776;</button>
      </div>
      <div class="topbar">
        <div>
          <h1>Kelola Kupon</h1>
          <div class="subtitle" id="totalSubtitle">Memuat data kupon...</div>
        </div>
        <div class="topbar-actions">
          <a class="btn btn-outline btn-sm" href="cetak.html">Cetak Kupon</a>
          <span id="masjidSwitcherWrap"></span>
        </div>
      </div>

      <div class="grid grid-2">
        <div class="card form-card">
          <h3 style="font-size:15px;margin-bottom:12px">Tambah Kupon Satuan</h3>
          <div class="field">
            <label for="paketSingle">Jenis paket</label>
            <input type="text" id="paketSingle" value="Daging Qurban">
          </div>
          <button class="btn btn-primary btn-block" id="btnAddSingle">Tambah Kupon</button>
        </div>

        <div class="card form-card">
          <h3 style="font-size:15px;margin-bottom:12px">Generate Massal</h3>
          <div class="field-row">
            <div class="field">
              <label for="paketBulk">Jenis paket</label>
              <input type="text" id="paketBulk" value="Daging Qurban">
            </div>
            <div class="field">
              <label for="jumlahBulk">Jumlah</label>
              <input type="number" id="jumlahBulk" value="10" min="1" max="1000">
            </div>
          </div>
          <button class="btn btn-gold btn-block" id="btnAddBulk">Generate</button>
        </div>
      </div>

      <div class="section-title">Daftar Kupon</div>

      <div class="field" style="max-width: 320px; margin-bottom: 16px;">
        <input type="text" id="searchInput" placeholder="Cari nomor kupon...">
      </div>

      <div class="ticket-list" id="ticketList">
        <p class="hint">Memuat...</p>
      </div>

      <div id="paginationWrap"></div>
    </main>
  </div>

  <script src="assets/js/config.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/nav.js"></script>
  <script>
    const session = renderShell("kupon");
    let allCoupons = [];

    if (session) {
      if (session.role === "SUPER_ADMIN") renderMasjidSwitcher(loadCoupons);

      loadCoupons();
      document.getElementById("btnAddSingle").addEventListener("click", addSingle);
      document.getElementById("btnAddBulk").addEventListener("click", addBulk);
      document.getElementById("searchInput").addEventListener("input", function () {
        renderList(filterCoupons(this.value));
      });
    }

    async function loadCoupons() {
      const listEl = document.getElementById("ticketList");
      listEl.innerHTML = '<p class="hint">Memuat...</p>';

      try {
        allCoupons = await Api.call("list", {});
        document.getElementById("totalSubtitle").textContent = allCoupons.length + " kupon terdaftar";
        renderList(allCoupons);
      } catch (err) {
        showToast(err.message, true);
        listEl.innerHTML = '<p class="hint">Gagal memuat data.</p>';
      }
    }

    function filterCoupons(query) {
      const q = query.trim().toLowerCase();
      if (!q) return allCoupons;
      return allCoupons.filter(function (c) {
        return c.nomor_kupon.toLowerCase().indexOf(q) !== -1;
      });
    }

    const PAGE_SIZE = 20;
    let currentPage = 1;
    let currentFiltered = [];

    function renderList(data) {
      // urutkan: nomor terbesar (paling baru dibuat) tampil di atas
      currentFiltered = (data || []).slice().sort(function (a, b) {
        return a.nomor_kupon < b.nomor_kupon ? 1 : -1;
      });
      currentPage = 1;
      renderPage();
    }

    function renderPage() {
      const listEl = document.getElementById("ticketList");
      const totalPages = Math.max(1, Math.ceil(currentFiltered.length / PAGE_SIZE));
      if (currentPage > totalPages) currentPage = totalPages;

      if (currentFiltered.length === 0) {
        listEl.innerHTML = '<div class="empty-state"><h3>Belum ada kupon</h3><p>Tambahkan kupon satuan atau generate massal di atas.</p></div>';
        document.getElementById("paginationWrap").innerHTML = "";
        return;
      }

      const start = (currentPage - 1) * PAGE_SIZE;
      const pageItems = currentFiltered.slice(start, start + PAGE_SIZE);

      listEl.innerHTML = pageItems.map(function (c) {
        const urut = c.nomor_kupon.split("-").pop();
        return '<div class="ticket">' +
          '<div class="ticket-stub"><div class="stub-no">#' + urut + '</div><div class="stub-label">Urut</div><div class="ticket-perf"></div></div>' +
          '<div class="ticket-body">' +
            '<div class="t-nomor">' + c.nomor_kupon + '</div>' +
            '<div class="t-meta">' + (c.jenis_paket || "-") + (c.tanggal_ditukar ? " &middot; ditukar " + fmtTanggal(c.tanggal_ditukar) + " oleh " + (c.petugas || "-") : "") + '</div>' +
          '</div>' +
          '<div class="ticket-side">' +
            statusBadge(c.status) +
            '<button class="btn btn-danger btn-sm" data-nomor="' + c.nomor_kupon + '">Hapus</button>' +
          '</div>' +
        '</div>';
      }).join("");

      listEl.querySelectorAll("button[data-nomor]").forEach(function (btn) {
        btn.addEventListener("click", function () { deleteCoupon(btn.getAttribute("data-nomor")); });
      });

      renderPagination(totalPages, start, pageItems.length);
    }

    function renderPagination(totalPages, start, shownCount) {
      const wrap = document.getElementById("paginationWrap");

      const info = '<div class="pagination-info">Menampilkan ' + (start + 1) + '&ndash;' + (start + shownCount) +
        ' dari ' + currentFiltered.length + ' kupon</div>';

      if (totalPages <= 1) {
        wrap.innerHTML = info;
        return;
      }

      const pages = getPageTokens(currentPage, totalPages);

      const buttons = pages.map(function (p) {
        if (p === "...") return '<span class="page-ellipsis">&hellip;</span>';
        const cls = p === currentPage ? "active" : "";
        return '<button class="' + cls + '" data-page="' + p + '">' + p + '</button>';
      }).join("");

      wrap.innerHTML = info +
        '<div class="pagination">' +
          '<button data-page="' + (currentPage - 1) + '" ' + (currentPage === 1 ? "disabled" : "") + '>&lsaquo;</button>' +
          buttons +
          '<button data-page="' + (currentPage + 1) + '" ' + (currentPage === totalPages ? "disabled" : "") + '>&rsaquo;</button>' +
        '</div>';

      wrap.querySelectorAll("button[data-page]").forEach(function (btn) {
        btn.addEventListener("click", function () {
          currentPage = parseInt(btn.getAttribute("data-page"), 10);
          renderPage();
          document.querySelector(".section-title").scrollIntoView({ behavior: "smooth", block: "start" });
        });
      });
    }

    // Bikin daftar token halaman dengan "..." kalau halamannya banyak,
    // supaya gak nunjukin 50 tombol nomor sekaligus.
    function getPageTokens(current, total) {
      const delta = 1;
      const range = [];
      for (let i = Math.max(2, current - delta); i <= Math.min(total - 1, current + delta); i++) {
        range.push(i);
      }
      if (current - delta > 2) range.unshift("...");
      if (current + delta < total - 1) range.push("...");
      range.unshift(1);
      if (total > 1) range.push(total);
      return range;
    }

    async function addSingle() {
      const paket = document.getElementById("paketSingle").value.trim() || "Daging Qurban";
      try {
        const res = await Api.call("add", { paket });
        if (!res.success) { showToast(res.message, true); return; }
        showToast("Kupon " + res.nomor_kupon + " ditambahkan.");
        loadCoupons();
      } catch (err) { showToast(err.message, true); }
    }

    async function addBulk() {
      const paket = document.getElementById("paketBulk").value.trim() || "Daging Qurban";
      const jumlah = document.getElementById("jumlahBulk").value || 10;

      const btn = document.getElementById("btnAddBulk");
      btn.disabled = true;
      btn.textContent = "Memproses...";

      try {
        const res = await Api.call("bulk", { paket, jumlah });
        if (!res.success) { showToast(res.message, true); return; }
        showToast(res.jumlah + " kupon berhasil dibuat.");
        loadCoupons();
      } catch (err) {
        showToast(err.message, true);
      } finally {
        btn.disabled = false;
        btn.textContent = "Generate";
      }
    }

    async function deleteCoupon(nomor) {
      if (!confirm("Hapus kupon " + nomor + "? Tindakan ini tidak bisa dibatalkan.")) return;

      try {
        const res = await Api.call("delete", { nomor });
        if (!res.success) { showToast(res.message, true); return; }
        showToast("Kupon " + nomor + " dihapus.");
        loadCoupons();
      } catch (err) { showToast(err.message, true); }
    }
  </script>
</body>
</html>
